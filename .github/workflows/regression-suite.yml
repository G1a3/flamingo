name: Regression suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regression-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAVEN_OPTS: ''
      JAVA_TOOL_OPTIONS: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove local Maven JVM flags (Java 17 incompatible)
        run: rm -f .mvn/jvm.config

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile tests
        run: mvn -B -ntp test-compile

      - name: Install Playwright system dependencies
        run: mvn -B -ntp exec:java -Dexec.mainClass=com.microsoft.playwright.CLI "-Dexec.args=install-deps"

      - name: Install Playwright Chromium
        run: mvn -B -ntp exec:java -Dexec.mainClass=com.microsoft.playwright.CLI "-Dexec.args=install chromium"

      - name: Run tests
        run: mvn -B -ntp test -Dheadless=true

      - name: Generate Allure report
        if: always()
        run: mvn -B -ntp allure:report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report

      - name: Add Allure report link to summary
        if: always()
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          URL="https://${OWNER}.github.io/${REPO}/"
          {
            echo "### Allure Report"
            echo "Published report: [**Allure Report**](${URL})"
            echo ""
            echo "**First-time setup (if the link is 404):**"
            echo "1. Open [Repository Pages settings](https://github.com/${{ github.repository }}/settings/pages)"
            echo "2. **Build and deployment → Source:** Deploy from a branch"
            echo "3. **Branch:** \`gh-pages\` / \`(root)\` → Save"
            echo "4. Re-run this workflow"
            echo ""
            echo "Fallback: download the \`allure-report\` artifact and run \`mvn allure:serve\` locally."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/
          retention-days: 14
