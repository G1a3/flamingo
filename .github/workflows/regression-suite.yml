name: Regression suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regression-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAVEN_OPTS: ''
      JAVA_TOOL_OPTIONS: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove local Maven JVM flags (Java 17 incompatible)
        run: rm -f .mvn/jvm.config

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile tests
        run: mvn -B -ntp test-compile

      - name: Install Playwright system dependencies
        run: mvn -B -ntp exec:java -Dexec.mainClass=com.microsoft.playwright.CLI "-Dexec.args=install-deps"

      - name: Install Playwright Chromium
        run: mvn -B -ntp exec:java -Dexec.mainClass=com.microsoft.playwright.CLI "-Dexec.args=install chromium"

      - name: Run tests
        run: mvn -B -ntp test -Dheadless=true

      - name: Generate Allure report
        if: always()
        run: mvn -B -ntp allure:report

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/
          retention-days: 14

      - name: Upload Allure report for GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/allure-report

  publish-allure-report:
    needs: regression-suite
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add Allure report link to job summary
        run: |
          echo "### Allure Report" >> "$GITHUB_STEP_SUMMARY"
          echo "Open the interactive report: [**Allure Report**](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"
