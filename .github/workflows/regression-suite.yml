name: Regression suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  regression-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAVEN_OPTS: ''
      JAVA_TOOL_OPTIONS: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove local Maven JVM flags (Java 17 incompatible)
        run: rm -f .mvn/jvm.config

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile tests
        run: mvn -B -ntp test-compile

      - name: Install Playwright browsers
        run: mvn -B -ntp exec:java -Dexec.mainClass=com.microsoft.playwright.CLI "-Dexec.args=install --with-deps chromium"

      - name: Run tests
        run: mvn -B -ntp test -Dheadless=true

      - name: Generate Allure report
        if: always()
        run: mvn -B -ntp allure:report

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/
          retention-days: 14
