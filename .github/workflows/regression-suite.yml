name: Regression suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  regression-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAVEN_OPTS: ''
      JAVA_TOOL_OPTIONS: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove local Maven JVM flags (Java 17 incompatible)
        run: rm -f .mvn/jvm.config

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile tests
        run: mvn -B -ntp test-compile

      - name: Install Playwright system dependencies
        run: mvn -B -ntp exec:java -Dexec.mainClass=com.microsoft.playwright.CLI "-Dexec.args=install-deps"

      - name: Install Playwright Chromium
        run: mvn -B -ntp exec:java -Dexec.mainClass=com.microsoft.playwright.CLI "-Dexec.args=install chromium"

      - name: Run tests
        run: mvn -B -ntp test -Dheadless=true

      - name: Generate Allure report
        if: always()
        run: mvn -B -ntp allure:report

      - name: Prepare static site for GitHub Pages
        if: always()
        run: touch target/allure-report/.nojekyll

      - name: Deploy Allure report to gh-pages branch
        if: always() && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report
          force_orphan: true
          enable_jekyll: false

      - name: Enable GitHub Pages (gh-pages branch)
        if: always() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const source = { branch: 'gh-pages', path: '/' };
            try {
              await github.rest.repos.getPages({ owner, repo });
              await github.rest.repos.updatePagesSite({
                owner,
                repo,
                build_type: 'legacy',
                source
              });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  build_type: 'legacy',
                  source
                });
              } else {
                throw error;
              }
            }

      - name: Add Allure report link to summary
        if: always()
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          URL="https://${OWNER}.github.io/${REPO}/"
          {
            echo "### Allure Report"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Download the \`allure-report\` artifact (Pages deploy runs on \`main\` only)."
            else
              echo "Published report: [**Allure Report**](${URL})"
              echo ""
              echo "If the site shows 404, wait 1–2 minutes for GitHub Pages to build, then refresh."
            fi
            echo ""
            echo "Manual setup (only if still 404): [Pages settings](https://github.com/${{ github.repository }}/settings/pages) → Deploy from branch \`gh-pages\` / \`(root)\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/
          retention-days: 14
